services:
  frontend:
    image: nginx:alpine
    container_name: spool-propus
    ports:
      - "8090:80"
      - "8443:443"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - spool-net

  api:
    build: ./backend
    container_name: spool-propus-api
    volumes:
      - spool-data:/data
      - ./.chat:/chat-exports
    env_file: .env
    restart: unless-stopped
    networks:
      - spool-net
      - spoolman_default

volumes:
  spool-data:

networks:
  spool-net:
    driver: bridge
  spoolman_default:
    external: true
