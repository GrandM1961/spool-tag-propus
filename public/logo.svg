<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Spool Tag Propus Logo">
  <defs>
    <linearGradient id="spoolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4aa"/>
      <stop offset="1" stop-color="#00a88a"/>
    </linearGradient>
    <linearGradient id="tagGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon only (no text), optimized for app/PWA usage -->
  <g filter="url(#softShadow)">
    <!-- Spool outer -->
    <circle cx="468" cy="468" r="332" fill="url(#spoolGrad)" stroke="#0b1120" stroke-width="26"/>

    <!-- Spool grooves (simple rings) -->
    <circle cx="468" cy="468" r="260" fill="none" stroke="#0b1120" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    <circle cx="468" cy="468" r="214" fill="none" stroke="#0b1120" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
    <circle cx="468" cy="468" r="172" fill="none" stroke="#0b1120" stroke-width="14" stroke-linecap="round" opacity="0.9"/>
    <circle cx="468" cy="468" r="132" fill="none" stroke="#0b1120" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

    <!-- Spool center hole -->
    <circle cx="468" cy="468" r="106" fill="#0b1120" opacity="0.95"/>
    <circle cx="468" cy="468" r="78" fill="transparent" stroke="#ffffff" stroke-width="10" opacity="0.35"/>

    <!-- Tag (bottom-right overlap) -->
    <g transform="translate(608 580) rotate(28)">
      <rect x="-10" y="-10" width="310" height="230" rx="44" fill="url(#tagGrad)" stroke="#0b1120" stroke-width="22"/>
      <circle cx="56" cy="56" r="34" fill="#0b1120" opacity="0.95"/>
      <circle cx="56" cy="56" r="18" fill="#ffffff" opacity="0.55"/>
    </g>
  </g>
</svg>
